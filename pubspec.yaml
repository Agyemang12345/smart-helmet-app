name: smart_helmet_monitor
description: A Flutter app for monitoring smart helmet sensor data via Blynk Cloud.

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.7
  http: ^1.1.0
  provider: ^6.0.5
  flutter_local_notifications: ^16.3.2
  firebase_core: 4.7.0
  firebase_auth: 6.4.0
  firebase_database: 12.3.0
  share_plus: ^7.2.2
  path_provider: ^2.1.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true